name: Sync web to deploy-server-web

on:
  push:
    branches:
      - web

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deploy-server (web branch)
        uses: actions/checkout@v4
        with:
          ref: web
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_WEB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to deploy-server-web
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add target git@github.com:RamizMohammad/deploy-server-web.git
          git push target web:QA --force

      - name: Notify Telegram (success)
        if: success()
        run: |
          MSG="✅ <b>Deployment Successful</b>%0A%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          🗂 <b>Project:</b> deploy-server-web%0A\
          🔀 <b>Repo:</b> <code>deploy-server</code> → <code>deploy-server-web</code>%0A\
          🌿 <b>Branch:</b> <code>web</code> → <code>QA</code>%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          📝 <b>Commit:</b> <code>${{ github.sha }}</code>%0A\
          💬 <b>Message:</b> ${{ github.event.head_commit.message }}%0A\
          👤 <b>Triggered by:</b> <a href=\"https://github.com/${{ github.actor }}\">${{ github.actor }}</a>%0A\
          🕐 <b>Time:</b> $(date -u '+%Y-%m-%d %H:%M:%S UTC')%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          🚀 <i>Live on QA environment</i>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_1 }}" \
            -d parse_mode="HTML" \
            -d text="$MSG"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_2 }}" \
            -d parse_mode="HTML" \
            -d text="$MSG"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          MSG="❌ <b>Deployment Failed</b>%0A%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          🗂 <b>Project:</b> deploy-server-web%0A\
          🔀 <b>Repo:</b> <code>deploy-server</code> → <code>deploy-server-web</code>%0A\
          🌿 <b>Branch:</b> <code>web</code> → <code>QA</code>%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          📝 <b>Commit:</b> <code>${{ github.sha }}</code>%0A\
          💬 <b>Message:</b> ${{ github.event.head_commit.message }}%0A\
          👤 <b>Triggered by:</b> <a href=\"https://github.com/${{ github.actor }}\">${{ github.actor }}</a>%0A\
          🕐 <b>Time:</b> $(date -u '+%Y-%m-%d %H:%M:%S UTC')%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          🔍 <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"><b>View Failed Run →</b></a>%0A\
          ━━━━━━━━━━━━━━━━━━━━━━%0A\
          ⚠️ <i>Please investigate and re-deploy.</i>"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_1 }}" \
            -d parse_mode="HTML" \
            -d text="$MSG"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_2 }}" \
            -d parse_mode="HTML" \
            -d text="$MSG"