name: Sync web to deploy-server-web

on:
  push:
    branches:
      - web

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deploy-server (web branch)
        uses: actions/checkout@v4
        with:
          ref: web
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_WEB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to deploy-server-web
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add target git@github.com:RamizMohammad/deploy-server-web.git
          git push target web:QA --force

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_1 }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *deploy-server-web synced*

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_2 }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *deploy-server-web synced*
            
          *Repo:* deploy-server → deploy-server-web
          *Branch:* web → main
          *Commit:* \`${{ github.sha }}\`
          *By:* ${{ github.actor }}
          *Message:* ${{ github.event.head_commit.message }}"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_1 }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *deploy-server-web sync FAILED*

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID_2 }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *deploy-server-web sync FAILED*
          
          *Repo:* deploy-server → deploy-server-web
          *Branch:* web → main
          *Commit:* \`${{ github.sha }}\`
          *By:* ${{ github.actor }}
          *Message:* ${{ github.event.head_commit.message }}
          
          [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
